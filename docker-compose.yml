# Локальная разработка: PHP + MySQL (без установки на Windows)
# Запуск: docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: hockey_mysql
    environment:
      MYSQL_DATABASE: hockey_time
      MYSQL_USER: hockey
      MYSQL_PASSWORD: hockey
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - hockey_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build: ./docker/php
    container_name: hockey_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  hockey_mysql_data:
